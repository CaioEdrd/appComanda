<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Editar Produto</title>
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-warning">
        <div class="container-fluid">
            <div class="d-flex align-items-center gap-2">
                <a href="/">
                    <img src="/static/img/logo_espetinho.png" alt="Logo" width="40" height="40">
                </a>
                <h1 class="fs-4 mb-0">
                    <a href="/" class="text-decoration-none text-dark fw-bold">Flask Espetinho</a>
                </h1>
            </div>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="btn btn-primary" href="/produtos">Produtos</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- FLASH MESSAGES -->
    {% for categoria, mensagem in get_flashed_messages(with_categories=true) %}
        <div class="alert alert-{{ categoria }} alert-dismissible fade show mb-0">
            {{ mensagem }}
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}

    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="text-center mb-4">Editar Produto</h3>

                <form action="{{ url_for('atualizar_produto', id=produto.id) }}" method="POST">

                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" name="nome" class="form-control"
                               value="{{ produto.nome }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Preço</label>
                        <input type="number" step="0.01" name="preco_venda" class="form-control"
                               value="{{ produto.preco_venda }}" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success w-100">Atualizar</button>
                        <a href="{{ url_for('apagar_produto', id=produto.id) }}" class="btn btn-danger">Apagar</a>
                        <a href="{{ url_for('produto') }}" class="btn btn-secondary">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
