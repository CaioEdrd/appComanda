{% extends "base.html" %}

{% block content %}
   <!--Página editar item de uma comanda-->

    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="text-center mb-4">Editar item — Comanda #{{ comanda.id }}</h3>

                <form method="POST">
                    {{ form.hidden_tag() }}

                    <div class="mb-3">
                        <label class="form-label">Produto</label>
                        <input type="text" class="form-control" value="{{ item.nome }}" disabled> <!--Preenche com o nome e não permite sua alteração-->
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Valor unitário</label>
                        <input type="text" class="form-control"
                            value="R$ {{ '%.2f'|format(item.valor_unitario | float) }}" disabled> <!--Preenche com o valor e não permite sua alteração-->
                    </div> 

                    <div class="mb-3"> <!--Permite a edição apenas da quantidade-->
                        {{ form.quantidade.label(class="form-label") }}
                        {{ form.quantidade(class="form-control", min="1") }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subtotal atual</label>
                        <input type="text" class="form-control"
                            value="R$ {{ '%.2f'|format(item.subtotal | float) }}" disabled>
                    </div>

                    <div class="d-flex gap-2">
                        <!--Ações-->
                        <button type="submit" class="btn btn-success">Atualizar item</button>
                        <a href="{{ url_for('comanda.detalhe_comanda', id=comanda.id) }}" class="btn btn-secondary">Voltar</a>

                        <form action="{{ url_for('comanda.apagar_item', comanda_id=comanda.id, item_id=item.id) }}" method="POST">
                            {{ form.hidden_tag() }}
                            <button type="submit" class="btn btn-danger">Apagar item</button>
                        </form>
                    </div>
                </form>
            </div>
        </div>
    </div>

{%endblock%}
